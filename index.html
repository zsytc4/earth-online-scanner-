  输出:{偏:{name:"破阵法师",tag:"规则是用来拆的，拆完的零件刚好够造新的",desc:"破阵法师是地球Online里最让GM头疼的角色模板——这个角色存在的核心意义就是把关卡规则拆成零件，然后用零件搭一个更有意思的东西。你的创造力不走正门专走消防通道，走完还要把消防通道重新装修一下。崇拜你的人觉得你是天才，被你波及的人觉得你是天灾。",ult:{n:"规则熔炉",d:"将现有规则完全解构，在废墟上即兴重建新秩序。冷却很长但每次释放都被全服记住。"},pass:[{n:"直觉编译器",d:"不读规则手册就能感知漏洞"},{n:"混沌亲和",d:"越乱越清醒，有序环境反而犯困"},{n:"表达过载",d:"脑子里四个想法排队偶尔堵车"}],eq:["🔥 高压环境 · deadline对别人是毒药，对你是氮气加速","📕 非主流信息源 · 你的弹药库从不在主干道上——冷门书、怪人、跨界八卦都是装填物","🌙 深夜时段 · 你的灵感高峰在凌晨，系统在那个时段偷偷给你加成"],db:[{n:"续航崩坏",d:"爆发72小时冷却废两周"},{n:"善后过敏",d:"创造和破坏都行，收拾残局从底层缺失"}]},

  独立:{偏:{name:"暗影战士",tag:"第二名是第一个输家",desc:"暗影战士是地球Online里最不掩饰竞争心的角色。你不是不合群——你只是不接受自己不是最强的那个。排行榜、对比、胜负，这些是你的燃料。行动力在「有人比你快」的时候达到峰值。你不是坏人，你只是把游戏当游戏玩得最认真的那个。",ult:{n:"夺命追击",d:"锁定目标后所有资源自动聚焦直到超越。副作用：忽略所有非目标事项。"},pass:[{n:"竞争雷达",d:"发现对手时注意力自动拉满"},{n:"速度本能",d:"任何赛道都想第一个到"},{n:"不服输体质",d:"失败是最强的buff"}],eq:["🏆 一个明确的对手 · 没有对手你会自己造一个，不如系统直接配发","⚡ 高强度竞争场 · 别人卷不动的地方，是你的充电桩","📊 实时排名系统 · 看不到名次你焦虑，看到名次你上头——后者对你是良性的"],db:[{n:"赢了空虚",d:"超过目标后瞬间失去动力"},{n:"关系损耗",d:"竞争模式偶尔开到不该开的地方"}]},

// ════════════════════════════════════════════
// 真八字引擎 v2 —— 格局法
// 逻辑：日主为核心 → 月令藏干定格局候选 → 透干者立格（本气优先）
// → 比劫不立格 → 格局十神定职业与正偏 → 月令权重远高于其他柱
// ════════════════════════════════════════════
const SS_GROUP={"比肩":"独立","劫财":"独立","食神":"输出","伤官":"输出","正财":"资源","偏财":"资源","正官":"秩序","七杀":"秩序","偏官":"秩序","正印":"认知","偏印":"认知","枭神":"认知"};
const SS_PIAN=new Set(["劫财","伤官","偏财","七杀","偏官","偏印","枭神"]);
const GAN_INFO={"甲":["木",1],"乙":["木",0],"丙":["火",1],"丁":["火",0],"戊":["土",1],"己":["土",0],"庚":["金",1],"辛":["金",0],"壬":["水",1],"癸":["水",0]};
const SHENG={木:"火",火:"土",土:"金",金:"水",水:"木"};
const KE={木:"土",土:"水",水:"火",火:"金",金:"木"};
const ZHI_WX={子:"水",丑:"土",寅:"木",卯:"木",辰:"土",巳:"火",午:"火",未:"土",申:"金",酉:"金",戌:"土",亥:"水"};
const ELEM_PREFIX={金:"精准",木:"生长",水:"隐流",火:"爆燃",土:"磐固"};
// 十神推算：以日主为"我"，看对方与我的生克与阴阳
function shiShenOf(dayGan,g){
  const di=GAN_INFO[dayGan],gi=GAN_INFO[g];if(!di||!gi)return null;
  const same=di[1]===gi[1];
  if(gi[0]===di[0])return same?"比肩":"劫财";
  if(SHENG[di[0]]===gi[0])return same?"食神":"伤官";
  if(KE[di[0]]===gi[0])return same?"偏财":"正财";
  if(KE[gi[0]]===di[0])return same?"七杀":"正官";
  return same?"偏印":"正印";
}

function realBazi(y,m,d,hour,timeKnown){
  try{
    if(typeof Solar==="undefined")return null;
    const solar=Solar.fromYmdHms(y,m,d,timeKnown?hour:12,0,0);
    const ec=solar.getLunar().getEightChar();
    const dayGan=ec.getDayGan();
    const elem=GAN_INFO[dayGan][0];
    const monthZhi=ec.getMonthZhi();

    // ── 1. 格局：月令主气十神 → 格局 → 职业维度（库方法，不用自己算十神）──
    const mzSS=ec.getMonthShiShenZhi()||[];
    const patternSS=mzSS[0]||ec.getMonthShiShenGan()||"正印";
    const patternDim=SS_GROUP[patternSS]||"认知";
    const patternPian=SS_PIAN.has(patternSS);

    // ── 2. 得令判定（月令五行对日主的影响）──
    const mWx=ZHI_WX[monthZhi];
    const deLing=(mWx===elem);
    const yLSW=(SHENG[mWx]===elem);
    const wSYL=(SHENG[elem]===mWx);
    const yLKW=(KE[mWx]===elem);

    // ── 3. 十神分布（直接用库的 getXxxShiShen，不做自定义计算）──
    const sums={};DIM_ORDER.forEach(g=>sums[g]=0);
    const indiv={};
    const addSS=(ss,w)=>{if(!ss)return;const grp=SS_GROUP[ss];if(!grp)return;sums[grp]+=w;indiv[ss]=(indiv[ss]||0)+w;};
    addSS(ec.getYearShiShenGan(),1.0);
    addSS(ec.getMonthShiShenGan(),1.0);
    if(timeKnown)addSS(ec.getTimeShiShenGan(),1.0);
    const zhiW=[0.7,0.3,0.2];
    (ec.getYearShiShenZhi()||[]).forEach((ss,i)=>addSS(ss,zhiW[i]||0.1));
    (ec.getMonthShiShenZhi()||[]).forEach((ss,i)=>addSS(ss,i===0?2.0:(zhiW[i]||0.1)));
    (ec.getDayShiShenZhi()||[]).forEach((ss,i)=>addSS(ss,zhiW[i]||0.1));
    if(timeKnown)(ec.getTimeShiShenZhi()||[]).forEach((ss,i)=>addSS(ss,zhiW[i]||0.1));

    // ── 4. 强弱（得令为纲）──
    let strength=0;
    if(deLing)strength+=3;else if(yLSW)strength+=2;else if(wSYL)strength-=2;else if(yLKW)strength-=3;
    const dZhi=ec.getDayZhi();
    if(ZHI_WX[dZhi]===elem)strength+=1;else if(SHENG[ZHI_WX[dZhi]]===elem)strength+=1.5;
    if(SHENG[elem]===ZHI_WX[dZhi])strength-=0.5;
    strength+=sums["认知"]*0.3+sums["独立"]*0.2;
    strength-=sums["输出"]*0.25+sums["秩序"]*0.25;
    const strong=strength>=1.0;

    // ── 5. 职业：格局驱动（比劫格特殊处理）──
    let hi;
    if(patternDim==="独立"){
      hi=strong?["输出","资源","秩序"].reduce((a,b)=>sums[a]>=sums[b]?a:b)
               :["认知","独立"].reduce((a,b)=>sums[a]>=sums[b]?a:b);
    }else{
      hi=patternDim;
      // 格局维度极弱时（被严重克制），降级取次强
      if(sums[hi]<1.0&&strong){
        hi=["输出","资源","秩序"].filter(d=>d!==hi).reduce((a,b)=>sums[a]>=sums[b]?a:b)||hi;
      }
    }
    let p=0,z=0;Object.keys(indiv).forEach(ss=>{if(SS_GROUP[ss]===hi){if(SS_PIAN.has(ss))p+=indiv[ss];else z+=indiv[ss];}});
    const vt=p>=z?"偏":"正";

    // ── 6. 雷达 & Loop ──
    const maxS=Math.max(...DIM_ORDER.map(g=>sums[g]),0.01);
    const pct={};const lv={};
    const sorted=[...DIM_ORDER].sort((a,b)=>sums[b]-sums[a]);
    sorted.forEach((g,i)=>{lv[g]=i<2?"H":i<3?"M":"L";});
    DIM_ORDER.forEach(g=>{pct[g]=Math.round(28+(sums[g]/maxS)*67);});
    const lo=DIM_ORDER.reduce((a,b)=>sums[a]<=sums[b]?a:b);
    return {prefix:ELEM_PREFIX[elem],element:elem,dayGan,geju:patternSS+"格",hiDim:hi,loDim:lo,variant:vt,pct,lv,demo:false};
  }catch(e){return null;}
}
function demoBazi(y,m,d){
  let seed=y*10000+m*100+d;const rnd=()=>{seed=(seed*9301+49297)%233280;return seed/233280;};
  const sums={};DIM_ORDER.forEach(g=>sums[g]=1+rnd()*3);
  const hi=DIM_ORDER.reduce((a,b)=>sums[a]>=sums[b]?a:b);
  const lo=DIM_ORDER.reduce((a,b)=>sums[a]<=sums[b]?a:b);
  const elem=["木","火","土","金","水"][y%5];
  const maxS=Math.max(...DIM_ORDER.map(g=>sums[g]));
  const pct={};const lv={};const sorted=[...DIM_ORDER].sort((a,b)=>sums[b]-sums[a]);
  sorted.forEach((g,i)=>{lv[g]=i<2?"H":i<3?"M":"L";});
  DIM_ORDER.forEach(g=>{pct[g]=Math.round(28+(sums[g]/maxS)*67);});
  return {prefix:ELEM_PREFIX[elem],element:elem,dayGan:"演",hiDim:hi,loDim:lo,variant:rnd()>0.5?"偏":"正",pct,lv,demo:true};
}

  },[answers,B]);
  const strength=useMemo(()=>65+Math.floor(Math.random()*25),[]);
  const Lk=({t})=><div style={{display:'flex',alignItems:'center',gap:8,padding:'12px 0',color:'var(--gdim)',fontSize:13,borderBottom:'1px solid var(--bdr)'}}>🔒 <span>{t}</span><span style={{marginLeft:'auto',fontSize:11,color:'var(--dim)'}}>加微信解锁</span></div>;

  return <div className="fade">
    {B.demo&&<div className="demo-badge">演示模式 · 排盘引擎未加载</div>}
    {/* ═══ 免费层 ═══ */}
    <div className="sec" style={{paddingTop:44,paddingBottom:32,textAlign:'center'}}>
      <div className="cz" style={{color:'var(--dim)',fontSize:10,letterSpacing:'.3em',marginBottom:12}}>开 局 配 置 报 告</div>
      <div className="gm" style={{color:'var(--gdim)',letterSpacing:12,opacity:.6,margin:'10px 0'}}>— ◆ —</div>
      <div className="cz" style={{color:'var(--gold)',fontSize:12,marginBottom:4}}>{B.prefix}</div>
      <h1 style={{color:'var(--gb)',fontSize:32,fontWeight:900,margin:'2px 0 8px'}}>{C.name}</h1>
      <div style={{display:'inline-block',border:'1px solid var(--gdim)',padding:'4px 14px',fontSize:12,marginBottom:16}}><span style={{color:'var(--dim)'}}>当前 · </span><span style={{color:'var(--gold)'}}>{state}</span></div>
      <div className="gm" style={{fontSize:13,color:'var(--gdim)',marginBottom:20}}>— {C.tag} —</div>
      <div style={{display:'flex',justifyContent:'center',gap:24,fontSize:12}}>
        <div><span style={{color:'var(--dim)'}}>主模块 </span><span style={{color:'var(--gb)',fontWeight:700}}>{B.hiDim}</span></div>
        <div style={{color:'var(--bdr)'}}>|</div>
        <div><span style={{color:'var(--dim)'}}>Loop信号 </span><span style={{color:'var(--red)',fontWeight:700}}>×1</span></div>
      </div>
      <div style={{color:'var(--dim)',fontSize:10,marginTop:8}}>角色由你的上线数据推算 · 非答题决定</div>
    </div>

    <div className="sec" style={{paddingTop:20,paddingBottom:20}}>
      <Radar pct={B.pct}/>
      <p style={{color:'var(--dim)',fontSize:11,textAlign:'center',marginTop:10}}>你的五组模块出厂配置 · 最弱的那条线里，藏着你的Loop</p>
    </div>

    <div className="sec"><div className="cz" style={{color:'var(--gdim)',fontSize:10,marginBottom:12}}>IDENTITY</div><h3 style={{color:'var(--gold)',fontSize:16,marginBottom:14,fontWeight:700}}>角色描述</h3><p style={{fontSize:13.5,lineHeight:2}}>{C.desc}</p><p style={{fontSize:12,color:'var(--dim)',marginTop:14,fontStyle:'italic',lineHeight:1.9}}>{VARIANT_NOTE[C.name]}</p></div>

    {echoes.length>0&&<div className="sec" style={{background:'rgba(201,169,110,.03)'}}>
      <div className="cz" style={{color:'var(--gdim)',fontSize:10,marginBottom:14}}>ECHO</div>
      <h3 style={{color:'var(--gold)',fontSize:16,marginBottom:14,fontWeight:700}}>共鸣回响</h3>
      {echoes.map((e,i)=><p key={i} style={{fontSize:13.5,lineHeight:2,marginBottom:12,paddingLeft:14,borderLeft:'2px solid var(--gold)'}}>{e}</p>)}
    </div>}

    <div className="sec"><div className="cz" style={{color:'var(--gdim)',fontSize:10,marginBottom:14}}>ABILITIES</div>
      <div style={{background:'var(--card)',border:'1px solid var(--gdim)',padding:18,marginBottom:18}}><div style={{color:'var(--gb)',fontSize:16,fontWeight:700,marginBottom:8}}>⚔ {C.ult.n}</div><p style={{fontSize:12.5,lineHeight:1.9}}>{C.ult.d}</p></div>
      <div style={{color:'var(--dim)',fontSize:11,marginBottom:10}}>被动技能</div>
      {C.pass.map((p,i)=><div key={i} style={{marginBottom:12,paddingLeft:12,borderLeft:'2px solid var(--bdr)'}}><div style={{color:'var(--gold)',fontSize:13,fontWeight:600}}>{p.n}</div><div style={{fontSize:12,opacity:.85}}>{p.d}</div></div>)}
    </div>

    <div className="sec"><div className="cz" style={{color:'var(--gdim)',fontSize:10,marginBottom:14}}>EQUIPMENT</div><h3 style={{color:'var(--gold)',fontSize:16,marginBottom:6,fontWeight:700}}>装备栏</h3>
      <p style={{color:'var(--dim)',fontSize:11.5,marginBottom:12,lineHeight:1.8}}>以下环境对你的角色有天然增益——把自己放进这些场景，等于自带buff。</p>
      {C.eq.map((e,i)=>{const parts=e.split(' · ');return <div key={i} style={{padding:'10px 0',borderBottom:i<C.eq.length-1?'1px solid var(--bdr)':'none'}}><div style={{fontSize:13.5,fontWeight:600,color:'var(--parch)'}}>{parts[0]}</div>{parts[1]&&<div style={{fontSize:12,color:'var(--dim)',marginTop:2,lineHeight:1.8}}>{parts[1]}</div>}</div>;})}</div>

    <div className="sec"><div className="sc">
      <div className="cz" style={{color:'var(--dim)',fontSize:9,letterSpacing:'.4em',marginBottom:8}}>EARTH ONLINE</div>
      <div className="cz" style={{color:'var(--gold)',fontSize:11,marginBottom:2}}>{B.prefix}</div>
      <div style={{color:'var(--gb)',fontSize:26,fontWeight:900,marginBottom:4}}>{C.name}</div>
      <div className="gm" style={{fontSize:12,color:'var(--gdim)',marginBottom:6}}>{state}</div>
      <div className="gm" style={{fontSize:11,color:'var(--gdim)',marginBottom:16}}>"{C.tag}"</div>
      <div style={{display:'flex',justifyContent:'center',gap:18,fontSize:11}}>{DIM_ORDER.map(d=><div key={d}><div className="cz" style={{color:'var(--dim)',fontSize:8}}>{DIM_EN[d]}</div><div style={{color:'var(--gold)',fontWeight:700}}>{B.pct[d]}</div></div>)}</div>
      <div style={{color:'var(--dim)',fontSize:9,marginTop:14}}>主模块 {B.hiDim} · Loop信号 ×1</div>
    </div><div style={{textAlign:'center',marginTop:10,color:'var(--dim)',fontSize:11}}>↑ 可直接保存分享</div></div>

    {/* ═══ 闸门 ═══ */}
    {!unlocked&&<React.Fragment>
      <div className="sec">
        <div className="cz" style={{color:'var(--gdim)',fontSize:10,marginBottom:14}}>更多内容</div>
        <Lk t="▼ Debuff · 你的持续性弱点"/>
        <Lk t="📊 五维配置详解"/>
        <Lk t="⚡ 2026赛季信号 · 你今年的版本主题"/>
        <Lk t="🔑 Loop诊断 · 你最弱那条线的真相"/>
        <Lk t="🌒 前置剧情信号"/>
        <Lk t="MBTI × 地球Online 交叉解读"/>
      </div>
      <div className="sec" style={{textAlign:'center',paddingTop:32,paddingBottom:36}}>
        <div className="cz" style={{color:'var(--gdim)',fontSize:10,letterSpacing:'.3em',marginBottom:14}}>CONTINUE</div>
        <h3 style={{color:'var(--gold)',fontSize:17,fontWeight:700,marginBottom:6}}>加微信 · 查看更多</h3>
        <p style={{color:'var(--dim)',fontSize:12,marginBottom:16}}>更深的解读和一对一通道，在微信里展开</p>
        <img src="qrcode.png" alt="（将引路员微信二维码命名为 qrcode.png 上传到仓库后，此处显示）" style={{width:160,height:160,border:'1px solid var(--gdim)',objectFit:'cover',background:'#16120d',padding:4,color:'var(--dim)',fontSize:10}}/>
        <p style={{color:'var(--dim)',fontSize:12,margin:'16px 0 6px'}}>① 扫码添加引路员　② 发送你的存档码：</p>
        <div className="cz" style={{display:'inline-block',border:'1px dashed var(--gold)',padding:'10px 16px',color:'var(--gb)',fontSize:12,margin:'6px 0 16px',userSelect:'all',letterSpacing:'.05em',wordBreak:'break-all',maxWidth:'90%'}}>{saveCode}</div>
        <p style={{color:'var(--dim)',fontSize:12,marginBottom:10}}>③ 输入引路员回复的通行暗号：</p>
        <div style={{display:'flex',gap:8,maxWidth:300,margin:'0 auto'}}>
          <input className="inp" placeholder="通行暗号" value={code} onChange={e=>setCode(e.target.value)} style={{textAlign:'center'}}/>
          <button className="btn" style={{width:'auto',padding:'12px 20px'}} onClick={()=>{if(code.trim()===UNLOCK_CODE)setUnlocked(true);else alert('暗号不正确，请向引路员确认');}}>进入</button>
        </div>
      </div>
    </React.Fragment>}

    {/* ═══ 解锁层 ═══ */}
    {unlocked&&<div className="fade">
      <div className="sec"><div className="cz" style={{color:'var(--red)',fontSize:10,marginBottom:14}}>DEBUFF</div>{C.db.map((d,i)=><div key={i} style={{marginBottom:12,padding:16,background:'rgba(163,85,58,.06)',border:'1px solid rgba(163,85,58,.2)'}}><div style={{color:'var(--red)',fontSize:14,fontWeight:600,marginBottom:4}}>▼ {d.n}</div><div style={{fontSize:12.5,lineHeight:1.8}}>{d.d}</div></div>)}</div>

      <div className="sec">
        <div className="cz" style={{color:'var(--gdim)',fontSize:10,marginBottom:14}}>DIMENSIONS</div>
        <h3 style={{color:'var(--gold)',fontSize:16,marginBottom:18,fontWeight:700}}>五维配置详解</h3>
        {DIM_ORDER.map(d=><div key={d} style={{marginBottom:18}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}><span className="cz" style={{color:'var(--dim)',fontSize:9}}>{DIM_EN[d]}</span><span style={{fontSize:13,fontWeight:600}}>{d}</span></div>
            <div style={{display:'flex',alignItems:'center',gap:6}}><span className={"lv lv-"+B.lv[d]}>{B.lv[d]}</span><span style={{color:'var(--dim)',fontSize:11}}>{B.pct[d]}</span></div>
          </div>
          <div className="bar-t"><div className="bar-f" style={{width:B.pct[d]+"%",background:B.lv[d]==='H'?'var(--gold)':B.lv[d]==='M'?'var(--gdim)':'var(--red)'}}/></div>
          <div style={{color:'var(--dim)',fontSize:11.5,marginTop:5,lineHeight:1.8}}>{DIM_DETAIL[d][B.lv[d]]}</div>
        </div>)}
        <p style={{color:'var(--dim)',fontSize:10,marginTop:4}}>注：以上为出厂配置读数，由上线数据推算，非答题得分。</p>
      </div>

      <div className="sec" style={{background:'rgba(201,169,110,.03)'}}>
        <div className="cz" style={{color:'var(--gdim)',fontSize:10,marginBottom:14}}>SEASON 2026</div>
        <h3 style={{color:'var(--gold)',fontSize:16,marginBottom:6,fontWeight:700}}>本赛季信号</h3>
        <div style={{display:'inline-block',border:'1px solid var(--gold)',padding:'6px 18px',margin:'8px 0 16px'}}><span style={{color:'var(--dim)',fontSize:11}}>版本主题 · </span><span style={{color:'var(--gb)',fontSize:16,fontWeight:700}}>{SE.theme}</span></div>
        <p style={{fontSize:13.5,lineHeight:2,marginBottom:12}}>{SE.s1}</p>
        <p style={{fontSize:13.5,lineHeight:2}}>{SE.s2}<span style={{color:'var(--dim)'}}> ▒▒▒▒▒▒……</span></p>
        
      </div>

      <div className="sec" style={{background:'rgba(201,169,110,.04)'}}>
        <div className="cz" style={{color:'var(--gdim)',fontSize:10,marginBottom:14}}>LOOP</div>
        <h3 style={{color:'var(--gold)',fontSize:17,marginBottom:16,fontWeight:700}}>Loop 诊断</h3>
        <p style={{fontSize:14,lineHeight:2,marginBottom:16}}>在你的五组模块里，<span style={{color:'var(--gb)'}}>{B.loDim}</span>是配置最弱的一条线——系统在这里检测到一组循环信号。</p>
        <div style={{padding:18,border:'1px solid var(--gdim)',background:'rgba(0,0,0,.15)',marginBottom:16}}>
          <div style={{color:'var(--gb)',fontSize:16,fontWeight:700,marginBottom:8}}>{L.name}</div>
          <p style={{fontSize:13,lineHeight:2,marginBottom:12}}>{L.desc}</p>
          <div className="cz" style={{fontSize:12,color:'var(--gold)',padding:'8px 12px',background:'rgba(0,0,0,.3)'}}>Loop: {L.code} · ██████░░░ {strength}%</div>
        </div>
        <p style={{color:'var(--dim)',fontSize:12.5,lineHeight:1.9}}>打个比方：这份扫描像手机的耗电检测——能告诉你后台有个程序在持续耗电，但看不到它是哪天装上的、因为什么装上的。</p>
      </div>

      <div className="sec">
        <div className="cz" style={{color:'var(--gdim)',fontSize:10,marginBottom:14}}>PREQUEL</div>
        <h3 style={{color:'var(--gold)',fontSize:16,marginBottom:14,fontWeight:700}}>前置剧情信号</h3>
        <p style={{fontSize:13,lineHeight:2,marginBottom:12}}>有些模式不是这辈子学来的——没人教过你，但你从记事起就会莫名怕某些东西、执着某些东西，像出厂就预装在账号里的程序。地球Online里把这一层叫<span style={{color:'var(--gold)'}}>前置剧情</span>：你这局开始之前的存档记录。</p>
        {birth.timeKnown?
          <div style={{padding:'14px 16px',border:'1px dashed var(--gdim)',fontSize:12.5,lineHeight:2}}>本次扫描在你的配置中检测到这一层的遗留信号：一个明确的执念方向，和一段等着被卸载的旧代码。</div>
          :<div style={{padding:'14px 16px',border:'1px dashed var(--red)',fontSize:12.5,lineHeight:2}}><span style={{color:'var(--red)'}}>⚠ 信号不完整</span> —— 读取这一层需要精确的出生时间。如果能从家人那里确认，这一层就能打开。</div>}
      </div>

      <div className="sec"><div className="cz" style={{color:'var(--gdim)',fontSize:10,marginBottom:14}}>CROSS ANALYSIS</div><h3 style={{color:'var(--gold)',fontSize:16,marginBottom:6,fontWeight:700}}>MBTI × {C.name}</h3><div style={{color:'var(--dim)',fontSize:11,marginBottom:14}}>选择你的 MBTI 类型</div>
        <div className="mg">{MBTI_TYPES.map(t=><button key={t} className={"mb "+(mbti===t?"act":"")} onClick={()=>setMbti(t)}>{t}</button>)}</div>
        {mbti&&mx[mbti]&&(()=>{const t=mx[mbti].split('——');const title=t[0];const body=t.slice(1).join('——');let h=0;for(const ch of mbti+C.name)h+=ch.charCodeAt(0);const st=3+(h%3);return <div className="fade" style={{marginTop:18}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}}><span style={{color:'var(--dim)',fontSize:12}}>{mbti} × {C.name}</span><span style={{color:'var(--gold)',fontSize:14,letterSpacing:2}}>{'★'.repeat(st)+'☆'.repeat(5-st)}</span></div>
          <div style={{color:'var(--gb)',fontSize:18,fontWeight:900,marginBottom:10}}>{title}</div>
          <p style={{fontSize:13,lineHeight:2}}>{body}</p>
        </div>;})()}
      </div>

      <div className="sec" style={{textAlign:'center'}}>
        <div className="gm" style={{color:'var(--gdim)',letterSpacing:12,opacity:.6}}>— ◆ —</div>
        <h3 style={{color:'var(--gb)',fontSize:18,fontWeight:700,margin:'16px 0 4px'}}>深度配置报告</h3>
        <p style={{color:'var(--dim)',fontSize:12,marginBottom:14}}>免费报告告诉你是什么人。这份告诉你什么时候出手、往哪走。</p>
        <div style={{textAlign:'left',maxWidth:380,margin:'0 auto 18px',fontSize:12.5,lineHeight:2.4}}>
          <p><span style={{color:'var(--gold)'}}>◆</span> 你现在跑在大版本的第几年、转折点在哪</p>
          <p><span style={{color:'var(--gold)'}}>◆</span> 2026 事业·关系·身体三线全开</p>
          <p><span style={{color:'var(--gold)'}}>◆</span> Loop 溯源 — 不是告诉你它在哪，是它从哪来</p>
          <p><span style={{color:'var(--gold)'}}>◆</span> 环境·作息·方位的可执行补丁</p>
          <p><span style={{color:'var(--gold)'}}>◆</span> 按你配置匹配的实体装备</p>
        </div>
        <p style={{color:'var(--dim)',fontSize:11,marginBottom:16}}>按存档码单份推演 · 引路员私发</p>
        <button className="btn" style={{maxWidth:300,margin:'0 auto'}} onClick={()=>{if(REVIEW_MODE)setShowSample(s=>!s);else alert('微信向引路员发送「深度报告」即可预约');}}>{REVIEW_MODE?(showSample?'收起样例':'微信发送「深度报告」预约（点击预览）'):'微信发送「深度报告」预约'}</button>
        {showSample&&<div className="fade" style={{textAlign:'left',marginTop:20,padding:18,border:'1px solid var(--gdim)',background:'rgba(0,0,0,.2)'}}>
          <p style={{color:'var(--red)',fontSize:10,marginBottom:12}}>▲ 审阅样例 · 正式版AI逐份生成</p>
          <h4 style={{color:'var(--gold)',fontSize:14,fontWeight:700,marginBottom:6}}>一 · 十年版本图谱</h4>
          <p style={{fontSize:12,lineHeight:2,marginBottom:10}}>当前运行在「{SE.theme}」大版本中段。转折点位于 ▒▒▒▒……</p>
          <h4 style={{color:'var(--gold)',fontSize:14,fontWeight:700,marginBottom:6}}>四 · 系统补丁</h4>
          <p style={{fontSize:12,lineHeight:2,marginBottom:10}}>{B.element}属 · {B.prefix}系。环境 ▒▒▒、作息 ▒▒▒、方位 ▒▒▒……</p>
          <h4 style={{color:'var(--gold)',fontSize:14,fontWeight:700,marginBottom:6}}>五 · 装备清单</h4>
          <p style={{fontSize:12,lineHeight:2}}>主装备 · {B.prefix}系适配 // 副装备 · 针对「{L.name}」补位</p>
        </div>}
        <div style={{color:'var(--dim)',fontSize:10,marginTop:20,lineHeight:2,maxWidth:340,marginLeft:'auto',marginRight:'auto'}}>仅供娱乐与自我探索。可以转发但别太当真——你的人生不由系统定义。</div>
        <div className="cz" style={{color:'var(--dim)',fontSize:9,marginTop:14}}>EARTH ONLINE · v6.0</div>
      </div>
    </div>}
  </div>;
}

function App(){
  const [stage,setStage]=useState("title");
  const [ans,setAns]=useState([]);
  const [birth,setBirth]=useState({y:1990,m:6,d:15,hour:12,timeKnown:true});
  return <div className="eo">
    {stage==="title"&&<Title go={()=>setStage("quiz")}/>}
    {stage==="quiz"&&<Quiz onDone={a=>{setAns(a);setStage("birth");}}/>}
    {stage==="birth"&&<Birth go={b=>{setBirth(b);setStage("load");}}/>}
    {stage==="load"&&<Loading go={()=>setStage("result")}/>}
    {stage==="result"&&<Result answers={ans} birth={birth}/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
