  输出:{偏:{name:"破阵法师",tag:"规则是用来拆的，拆完的零件刚好够造新的",desc:"破阵法师是地球Online里最让GM头疼的角色模板——这个角色存在的核心意义就是把关卡规则拆成零件，然后用零件搭一个更有意思的东西。你的创造力不走正门专走消防通道，走完还要把消防通道重新装修一下。崇拜你的人觉得你是天才，被你波及的人觉得你是天灾。",ult:{n:"规则熔炉",d:"将现有规则完全解构，在废墟上即兴重建新秩序。冷却很长但每次释放都被全服记住。"},pass:[{n:"直觉编译器",d:"不读规则手册就能感知漏洞"},{n:"混沌亲和",d:"越乱越清醒，有序环境反而犯困"},{n:"表达过载",d:"脑子里四个想法排队偶尔堵车"}],eq:["🔥 高压环境（deadline是buff）","📕 非主流信息源","🌙 深夜独处时间"],db:[{n:"续航崩坏",d:"爆发72小时冷却废两周"},{n:"善后过敏",d:"创造和破坏都行，收拾残局从底层缺失"}]},

  独立:{偏:{name:"暗影战士",tag:"第二名是第一个输家",desc:"暗影战士是地球Online里最不掩饰竞争心的角色。你不是不合群——你只是不接受自己不是最强的那个。排行榜、对比、胜负，这些是你的燃料。行动力在「有人比你快」的时候达到峰值。你不是坏人，你只是把游戏当游戏玩得最认真的那个。",ult:{n:"夺命追击",d:"锁定目标后所有资源自动聚焦直到超越。副作用：忽略所有非目标事项。"},pass:[{n:"竞争雷达",d:"发现对手时注意力自动拉满"},{n:"速度本能",d:"任何赛道都想第一个到"},{n:"不服输体质",d:"失败是最强的buff"}],eq:["🏆 明确的对手","⚡ 高强度竞争环境","📊 清晰的排名系统"],db:[{n:"赢了空虚",d:"超过目标后瞬间失去动力"},{n:"关系损耗",d:"竞争模式偶尔开到不该开的地方"}]},
  正:{name:"磐岩战士",tag:"不需要赢你，只需要不需要你",desc:"磐岩战士不争不抢不解释。你的独立不是对别人的对抗，而是对自己的信任——我能搞定所以不需要麻烦别人。你像一块石头，不主动碰撞也不会被推动。这种沉稳让你在任何环境都能活下来，但也让你错过了一些只有两个人才能打开的门。",ult:{n:"不动明王",d:"所有外部支援断开时自我回复和执行力翻倍。越孤立越强。"},pass:[{n:"自给自足",d:"对外部反馈依赖极低"},{n:"沉默抗性",d:"不容易被言语左右"},{n:"独处充能",d:"独处时恢复速度最快"}],eq:["🏔 独立空间","⏰ 自由安排的时间","🔒 不被干涉的权利"],db:[{n:"情感隔离",d:"太习惯一个人偶尔忘了感受也需要出口"},{n:"被动社交",d:"不主动维护关系等回头发现人走了"}]}},

  正:{name:"筑城猎人",tag:"慢慢来比较快",desc:"筑城猎人是地球Online里最有耐心的资源玩家——不追热门不抢风口，一砖一瓦慢慢建。满足感不来自一夜暴富来自看着数字稳定增长。你可能不是最富的但一定是资产负债表最健康的那个。背包里没有惊喜但永远不会空。",ult:{n:"铁壁金库",d:"资产进入绝对防御状态任何外部风险无法造成损失。缺点是也无法获得超额收益。"},pass:[{n:"成本预警",d:"任何超支自动触发提醒"},{n:"复利直觉",d:"自然理解时间和积累的关系"},{n:"风险过敏",d:"高风险选项自动降低吸引力"}],eq:["📈 稳定增长环境","🧮 清晰的记账工具","⏰ 足够长的时间线"],db:[{n:"机会恐惧",d:"好机会来了因为风险犹豫直到窗口关闭"},{n:"快乐延迟",d:"总觉得还没攒够不敢花"}]}},

function realBazi(y,m,d,hour,timeKnown){
  try{
    if(typeof Solar==="undefined")return null;
    const solar=Solar.fromYmdHms(y,m,d,timeKnown?hour:12,0,0);
    const ec=solar.getLunar().getEightChar();
    const dayGan=ec.getDayGan();
    const elem=GAN_ELEM[dayGan]||"火";
    // —— 十神统计（用于雷达/排行/弱项检测） ——
    const sums={};DIM_ORDER.forEach(g=>sums[g]=0);
    const indiv={};
    const add=(ss,w)=>{const g=SS_GROUP[ss];if(!g)return;sums[g]+=w;indiv[ss]=(indiv[ss]||0)+w;};
    const zhiW=[0.7,0.3,0.2];
    add(ec.getYearShiShenGan(),1.0);
    add(ec.getMonthShiShenGan(),1.0);
    (ec.getYearShiShenZhi()||[]).forEach((ss,i)=>add(ss,zhiW[i]||0.2));
    (ec.getMonthShiShenZhi()||[]).forEach((ss,i)=>add(ss,zhiW[i]||0.2));
    (ec.getDayShiShenZhi()||[]).forEach((ss,i)=>add(ss,zhiW[i]||0.2));
    if(timeKnown){
      add(ec.getTimeShiShenGan(),1.0);
      (ec.getTimeShiShenZhi()||[]).forEach((ss,i)=>add(ss,zhiW[i]||0.2));
    }
    // —— 格局：从月令主气取 ——
    const mZhi=ec.getMonthShiShenZhi()||[];
    const mGan=ec.getMonthShiShenGan();
    const patternSS=mZhi[0]||mGan||"正印";
    const patternDim=SS_GROUP[patternSS]||"认知";
    const patternVt=SS_PIAN.has(patternSS)?"偏":"正";
    // —— 日主强弱（得令/得地/得生/得助） ——
    const monthZhiName=ec.getMonthZhi()||"";
    const monthElem=ZHI_ELEM[monthZhiName]||"";
    let strength=0;
    if(monthElem===elem)strength+=2.5; // 得令
    const dZhi=ec.getDayShiShenZhi()||[];
    if(dZhi.some(s=>s==="比肩"||s==="劫财"))strength+=1.5; // 得地
    const yinStars=["正印","偏印","枭神"];
    Object.keys(indiv).forEach(ss=>{if(yinStars.includes(ss))strength+=indiv[ss]*0.7;}); // 得生
    const biJie=["比肩","劫财"];
    Object.keys(indiv).forEach(ss=>{if(biJie.includes(ss))strength+=indiv[ss]*0.4;}); // 得助
    const strLv=strength>=3.5?"身强":strength>=2?"中和":"身弱";
    // —— 最终判定 ——
    const hiDim=patternDim;
    const variant=patternVt;
    const lo=DIM_ORDER.reduce((a,b)=>sums[a]<=sums[b]?a:b);
    // 雷达百分比
    const raw=DIM_ORDER.map(g=>sums[g]);
    const maxS=Math.max(...raw,0.01);
    const pct={};const lv={};
    const sorted=[...DIM_ORDER].sort((a,b)=>sums[b]-sums[a]);
    sorted.forEach((g,i)=>{lv[g]=i<2?"H":i<3?"M":"L";});
    DIM_ORDER.forEach(g=>{pct[g]=Math.round(28+(sums[g]/maxS)*67);});
    return {
      prefix:ELEM_PREFIX[elem],element:elem,dayGan,
      hiDim,loDim,variant,
      pct,lv,
      strength:strLv,patternSS,
      yong:YONG_SHEN[hiDim][strLv==="身弱"?"weak":"strong"],
      demo:false
    };
  }catch(e){return null;}
}
// 排盘库加载失败时的演示模式
function demoBazi(y,m,d){
  let seed=y*10000+m*100+d;const rnd=()=>{seed=(seed*9301+49297)%233280;return seed/233280;};
  const sums={};DIM_ORDER.forEach(g=>sums[g]=1+rnd()*3);
  const hi=DIM_ORDER[Math.floor(rnd()*5)];
  const lo=DIM_ORDER.reduce((a,b)=>sums[a]<=sums[b]?a:b);
  const elem=["木","火","土","金","水"][y%5];
  const maxS=Math.max(...DIM_ORDER.map(g=>sums[g]));
  const pct={};const lv={};const sorted=[...DIM_ORDER].sort((a,b)=>sums[b]-sums[a]);
  sorted.forEach((g,i)=>{lv[g]=i<2?"H":i<3?"M":"L";});
  DIM_ORDER.forEach(g=>{pct[g]=Math.round(28+(sums[g]/maxS)*67);});
  const strLv=rnd()>0.6?"身强":rnd()>0.3?"中和":"身弱";
  return {prefix:ELEM_PREFIX[elem],element:elem,dayGan:"演",hiDim:hi,loDim:lo,variant:rnd()>0.5?"偏":"正",pct,lv,strength:strLv,patternSS:"演示",yong:YONG_SHEN[hi][strLv==="身弱"?"weak":"strong"],demo:true};

  const b=DIM_ORDER.map(d=>(pct[d]||50)/100);
  return <svg viewBox="0 0 200 208" style={{width:'100%',maxWidth:240,margin:'0 auto',display:'block'}}>
    <polygon points={ang.map((_,i)=>pt(i,1)).join(' ')} fill="none" stroke="#2e261c" strokeWidth=".5"/>

    {ang.map((a,i)=><line key={i} x1={cx} y1={cy} x2={cx+r*Math.cos(a)} y2={cy+r*Math.sin(a)} stroke="#2e261c" strokeWidth=".5"/>)}
    <polygon points={b.map((_,i)=>pt(i,b[i])).join(' ')} fill="rgba(201,169,110,.13)" stroke="#c9a96e" strokeWidth="1.6"/>

    {ang.map((a,i)=>{const x=cx+(r+16)*Math.cos(a),y=cy+(r+16)*Math.sin(a);return <text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle" fill="#8b7355" fontSize="8" fontFamily="'Noto Serif SC',serif">{DIM_ORDER[i]}</text>;})}

          :<div style={{padding:'14px 16px',border:'1px dashed var(--red)',fontSize:12.5,lineHeight:2}}><span style={{color:'var(--red)'}}>⚠ 信号不完整</span> —— 前置剧情层的解析需要精确的上线时刻。如能确认出生时间（可询问家人），将解锁这一层的完整读取。</div>}
      </div>

      <div className="sec"><div className="cz" style={{color:'var(--gdim)',fontSize:10,marginBottom:14}}>CROSS ANALYSIS</div><h3 style={{color:'var(--gold)',fontSize:16,marginBottom:6,fontWeight:700}}>MBTI × {C.name}</h3><div style={{color:'var(--dim)',fontSize:11,marginBottom:14}}>选择你的 MBTI 类型</div>
        <div className="mg">{MBTI_TYPES.map(t=><button key={t} className={"mb "+(mbti===t?"act":"")} onClick={()=>setMbti(t)}>{t}</button>)}</div>
        {mbti&&mx[mbti]&&<div className="fade" style={{marginTop:18}}><div style={{color:'var(--gb)',fontSize:15,fontWeight:700,marginBottom:10}}>{mbti} × {C.name}</div><p style={{fontSize:13,lineHeight:2}}>{mx[mbti]}</p></div>}
      </div>

      <div className="sec" style={{textAlign:'center'}}>
        <div className="gm" style={{color:'var(--gdim)',letterSpacing:12,opacity:.6}}>— ◆ —</div>
        <h3 style={{color:'var(--gb)',fontSize:18,fontWeight:700,margin:'16px 0 10px'}}>深度配置报告</h3>
        {!showDeep?<React.Fragment>
          <p style={{color:'var(--dim)',fontSize:13,marginBottom:20,lineHeight:2}}>基于你的月令格局和日主强弱，系统已生成专属配置简报。</p>
          <button className="btn btn-g" style={{maxWidth:280,margin:'0 auto'}} onClick={()=>{setShowDeep(true);setAiLoading(true);setAiReading(null);
    const bd={dayGan:B.dayGan,element:B.element,patternSS:B.patternSS,hiDim:B.hiDim,variant:B.variant,strength:B.strength,prefix:B.prefix,pct:B.pct,loDim:B.loDim,seasonTheme:SE.theme};
    const bd2=birth.y+'-'+String(birth.m).padStart(2,'0')+'-'+String(birth.d).padStart(2,'0');
    const bt=birth.timeKnown?String(birth.hour).padStart(2,'?')+':00':'';
    fetch(BACKEND_URL+'/api/generate-reading',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({birth_date:bd2,birth_time:bt,bazi_data:bd})})
    .then(r=>r.json()).then(d=>{setAiReading(d.reading||null);setAiLoading(false);}).catch(()=>{setAiLoading(false);});
  }}>展开预览</button>
        </React.Fragment>:
        {aiLoading?<div className="pulse" style={{textAlign:'center',padding:'40px 0'}}><div style={{color:'var(--gdim)',fontSize:16,marginBottom:8}}>命理宗师正在推演...</div><div style={{color:'var(--dim)',fontSize:11}}>结合八字格局，请稍候</div></div>:aiReading?<div className="fade" style={{textAlign:'left',whiteSpace:'pre-wrap',fontSize:13,lineHeight:2.2,padding:18,border:'1px solid var(--gdim)'}}>{aiReading}</div>:<div className="fade" style={{textAlign:'left'}}>
          <div style={{padding:18,border:'1px solid var(--gdim)',marginBottom:14}}>
            <div className="cz" style={{color:'var(--gold)',fontSize:10,marginBottom:8}}>格局分析</div>
            <p style={{fontSize:13,lineHeight:2,color:'var(--parch)'}}>月令 <span style={{color:'var(--gb)'}}>{B.patternSS}格</span>，日主<span style={{color:'var(--gb)'}}>{B.element}</span>属，<span style={{color:'var(--gold)'}}>{B.strength}</span>。{(B.strength==="身强"?"日主有根有气，能担财官——你是那种压力越大发挥越好的人。":B.strength==="中和"?"日主不弱不强，可塑性极高——环境对你的影响比配置本身更大。":"日主偏弱，需要借力——你不适合硬刚正面，找靠山比硬扛聪明十倍。")}格局当令，{(B.variant==="偏"?"偏":"正")}星透出，{(B.variant==="偏"?"不走正门走侧门，你的天赋在打破常规而不是遵守它。":"正统路线是你的最优解。稳扎稳打，按规则升级。")}</p>
          </div>
          <div style={{padding:18,border:'1px solid var(--gdim)',marginBottom:14}}>
            <div className="cz" style={{color:'var(--gold)',fontSize:10,marginBottom:8}}>用神 · 喜忌</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
              <div style={{background:'rgba(201,169,110,.06)',padding:12}}><span style={{color:'var(--dim)',fontSize:11}}>喜神（补）</span><div style={{color:'var(--gb)',fontSize:16,fontWeight:700,marginTop:4}}>{B.yong.yong}</div></div>
              <div style={{background:'rgba(163,85,58,.06)',padding:12}}><span style={{color:'var(--dim)',fontSize:11}}>忌神（避）</span><div style={{color:'var(--red)',fontSize:16,fontWeight:700,marginTop:4}}>{B.yong.ji}</div></div>
            </div>
            <p style={{fontSize:13,lineHeight:2,color:'var(--parch)'}}>{B.yong.tip}</p>
          </div>
          <div style={{padding:18,border:'1px solid var(--gdim)',marginBottom:14}}>
            <div className="cz" style={{color:'var(--gold)',fontSize:10,marginBottom:8}}>赛季行动建议</div>
            <p style={{fontSize:13,lineHeight:2,color:'var(--parch)'}}>你的{B.hiDim}模块由格局锁定为核心配置。{SE.theme}是你在本版本的第一优先级。不要把精力分散到五条线——集中{B.hiDim}一条，把{B.loDim}的短板交给队友或工具补。</p>
          </div>
          <p style={{color:'var(--dim)',fontSize:11,marginTop:8}}>以上为系统自动生成简报。</p>
        </div>}}
        <div style={{color:'var(--dim)',fontSize:10,marginTop:24,lineHeight:2,maxWidth:340,marginLeft:'auto',marginRight:'auto'}}>本报告仅供娱乐与自我探索。你可以笑可以转发但别太当真——你的人生不由任何系统定义。</div>
        <div className="cz" style={{color:'var(--dim)',fontSize:9,marginTop:16}}>EARTH ONLINE · v7.0</div>
      </div>
    </div>}
  </div>;
}

function App(){
  const [stage,setStage]=useState("title");
  const [ans,setAns]=useState([]);
  const [birth,setBirth]=useState({y:1990,m:6,d:15,hour:12,timeKnown:true});
  return <div className="eo">
    {stage==="title"&&<Title go={()=>setStage("quiz")}/>}
    {stage==="quiz"&&<Quiz onDone={a=>{setAns(a);setStage("birth");}}/>}
    {stage==="birth"&&<Birth go={b=>{setBirth(b);setStage("load");}}/>}
    {stage==="load"&&<Loading go={()=>setStage("result")}/>}
    {stage==="result"&&<Result answers={ans} birth={birth}/>}
  </div>;
}
const BACKEND_URL=localStorage.getItem("eo_backend_url")||"http://localhost:8000";

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
